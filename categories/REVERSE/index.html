<script>
(function() {
  const THEME = {
    cream: '#FFF3C9',
    pink: '#F3B3CC',
    cyan: '#ABE5E8',
    ink: '#236c73'
  };
  const APLAYER_JS = 'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js';
  const APLAYER_CSS = 'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css';
  const GSAP_JS = 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js';
  const SCROLL_TRIGGER_JS = 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js';

  window.PinkodeEnhance = window.PinkodeEnhance || {};
  const app = window.PinkodeEnhance;
  app.pageTweens = app.pageTweens || [];
  app.scrollTriggers = app.scrollTriggers || [];
  app.bgTweens = app.bgTweens || [];

  function loadStyle(href) {
    if ([...document.styleSheets].some(sheet => sheet.href && sheet.href.includes(href))) {
      return Promise.resolve();
    }
    if (document.querySelector(`link[href="${href}"]`)) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      link.onload = resolve;
      link.onerror = reject;
      document.head.appendChild(link);
    });
  }

  function loadScript(src, globalName) {
    if (globalName && window[globalName]) return Promise.resolve(window[globalName]);
    const existing = document.querySelector(`script[src="${src}"]`);
    if (existing) {
      return new Promise(resolve => {
        if (!globalName || window[globalName]) {
          resolve(window[globalName]);
          return;
        }
        existing.addEventListener('load', () => resolve(window[globalName]), { once: true });
      });
    }
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.defer = true;
      script.onload = () => resolve(globalName ? window[globalName] : true);
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  function ensureAPlayer() {
    return loadStyle(APLAYER_CSS)
      .then(() => loadScript(APLAYER_JS, 'APlayer'))
      .then(() => {
        if (app.aplayerInstance) return app.aplayerInstance;
        const container = document.getElementById('aplayer');
        if (!container || typeof APlayer === 'undefined') return null;
        app.aplayerInstance = new APlayer({
          container,
          fixed: true,
          mini: false,
          autoplay: false,
          theme: THEME.pink,
          loop: 'all',
          order: 'list',
          preload: 'auto',
          volume: 0.65,
          mutex: true,
          lrcType: 0,
          audio: [{
            name: 'My Foolish Heart~',
            artist: '椎名林檎',
            url: '/music/bg-music.mp3',
            cover: '/images/music-covers/R.jpg',
            theme: THEME.cyan
          }]
        });
        return app.aplayerInstance;
      })
      .catch(error => console.warn('[PinkodeEnhance] APlayer load failed:', error));
  }

  function ensureGSAP() {
    return loadScript(GSAP_JS, 'gsap')
      .then(() => loadScript(SCROLL_TRIGGER_JS, 'ScrollTrigger'))
      .then(() => {
        if (window.gsap && window.ScrollTrigger) {
          gsap.registerPlugin(ScrollTrigger);
          gsap.defaults({ duration: 0.65, ease: 'power3.out' });
        }
        return window.gsap;
      })
      .catch(error => console.warn('[PinkodeEnhance] GSAP load failed:', error));
  }

  function clearPageMotion() {
    app.pageTweens.forEach(tween => tween && tween.kill && tween.kill());
    app.pageTweens = [];
    if (window.ScrollTrigger) {
      app.scrollTriggers.forEach(trigger => trigger && trigger.kill && trigger.kill());
      app.scrollTriggers = [];
    }
  }

  function ensureCuteBackground() {
    let layer = document.querySelector('.pinkode-bg-layer');
    if (!layer) {
      layer = document.createElement('div');
      layer.className = 'pinkode-bg-layer';
      layer.setAttribute('aria-hidden', 'true');
      document.body.prepend(layer);
    }
    if (layer.dataset.pinkodeReady) return;
    layer.dataset.pinkodeReady = 'true';

    const specs = [
      ['star', 'pink', 5, 10, 30, 0.72], ['heart', 'cyan', 18, 16, 34, 0.64],
      ['flower', 'pink', 33, 9, 42, 0.62], ['bubble', 'cyan', 52, 13, 54, 0.46],
      ['petal', 'pink', 68, 8, 30, 0.68], ['bow', 'cyan', 84, 16, 48, 0.56],
      ['star', 'cyan', 94, 6, 28, 0.66], ['heart', 'pink', 8, 34, 38, 0.64],
      ['flower', 'cyan', 23, 46, 44, 0.56], ['bubble', 'pink', 40, 33, 64, 0.38],
      ['petal', 'cyan', 58, 43, 28, 0.62], ['bow', 'pink', 76, 36, 46, 0.58],
      ['star', 'pink', 91, 48, 26, 0.64], ['heart', 'cyan', 4, 65, 34, 0.58],
      ['flower', 'pink', 17, 82, 40, 0.58], ['bubble', 'cyan', 32, 68, 58, 0.4],
      ['petal', 'pink', 49, 78, 30, 0.62], ['bow', 'cyan', 64, 68, 44, 0.52],
      ['star', 'cyan', 80, 86, 28, 0.62], ['heart', 'pink', 94, 76, 36, 0.58],
      ['flower', 'cyan', 2, 92, 36, 0.5], ['bubble', 'pink', 88, 96, 62, 0.34],
      ['petal', 'cyan', 44, 4, 22, 0.58], ['bow', 'pink', 56, 94, 38, 0.5],
      ['star', 'pink', 72, 58, 22, 0.6], ['heart', 'cyan', 28, 92, 30, 0.52],
      ['flower', 'pink', 98, 28, 34, 0.5], ['bubble', 'cyan', 12, 52, 48, 0.38]
    ];

    const fragment = document.createDocumentFragment();
    specs.forEach(([shape, colorName, x, y, size, opacity], index) => {
      const item = document.createElement('i');
      item.className = `pinkode-floatie pinkode-floatie--${shape}`;
      item.style.setProperty('--x', `${x}%`);
      item.style.setProperty('--y', `${y}%`);
      item.style.setProperty('--s', `${size}px`);
      item.style.setProperty('--o', opacity);
      item.style.setProperty('--c', colorName === 'pink' ? THEME.pink : THEME.cyan);
      item.dataset.floatIndex = index;
      if (shape === 'bow') item.appendChild(document.createElement('span'));
      fragment.appendChild(item);
    });
    layer.appendChild(fragment);
  }

  function animateCuteBackground() {
    if (!window.gsap || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    ensureCuteBackground();
    if (app.bgTweens.length) return;
    const items = document.querySelectorAll('.pinkode-floatie');
    items.forEach((item, index) => {
      const driftX = index % 2 ? 58 : -58;
      const driftY = index % 3 ? -70 : 70;
      const duration = 4.8 + (index % 6) * 0.72;
      app.bgTweens.push(gsap.to(item, {
        x: driftX,
        y: driftY,
        rotation: index % 2 ? 36 : -36,
        scale: 1.08 + (index % 4) * 0.08,
        duration,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: index * 0.16
      }));
    });
  }

  function animatePage() {
    if (!window.gsap) return;
    clearPageMotion();
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const main = document.querySelector('.main-inner');
    const headerItems = document.querySelectorAll('.brand, .menu-item, .site-search');
    const heroParts = document.querySelectorAll('.home-hero__copy, .home-hero__mark, .home-hero__actions');
    const cards = document.querySelectorAll('.featured-post, .post-item, .post-block, .collection-title, .category-list-item, .tag-cloud a, .archive .post-header');
    const buttons = document.querySelectorAll('.btn, .post-button .btn, .pagination a, .featured-post a, .post-item a, .menu-item a, .sidebar-button a');

    gsap.set([main, ...cards], { willChange: 'transform, opacity' });
    app.pageTweens.push(gsap.fromTo(main, {
      autoAlpha: 0,
      y: reduceMotion ? 0 : 18,
      filter: reduceMotion ? 'none' : 'blur(8px)'
    }, {
      autoAlpha: 1,
      y: 0,
      filter: 'blur(0px)',
      duration: reduceMotion ? 0.01 : 0.7,
      clearProps: 'filter,willChange'
    }));

    if (headerItems.length) {
      app.pageTweens.push(gsap.fromTo(headerItems, {
        autoAlpha: 0,
        y: reduceMotion ? 0 : -12
      }, {
        autoAlpha: 1,
        y: 0,
        stagger: 0.04,
        duration: reduceMotion ? 0.01 : 0.55,
        clearProps: 'willChange'
      }));
    }

    if (heroParts.length) {
      app.pageTweens.push(gsap.fromTo(heroParts, {
        autoAlpha: 0,
        y: reduceMotion ? 0 : 24,
        scale: reduceMotion ? 1 : 0.98
      }, {
        autoAlpha: 1,
        y: 0,
        scale: 1,
        stagger: 0.08,
        duration: reduceMotion ? 0.01 : 0.78,
        ease: 'expo.out'
      }));
    }

    if (cards.length && window.ScrollTrigger && !reduceMotion) {
      const batch = ScrollTrigger.batch(cards, {
        start: 'top 86%',
        once: true,
        onEnter: elements => gsap.fromTo(elements, {
          autoAlpha: 0,
          y: 32,
          scale: 0.985
        }, {
          autoAlpha: 1,
          y: 0,
          scale: 1,
          stagger: 0.08,
          duration: 0.8,
          overwrite: true,
          clearProps: 'willChange'
        })
      });
      app.scrollTriggers.push(...batch);
    }

    buttons.forEach(button => {
      if (button.dataset.pinkodeHover) return;
      button.dataset.pinkodeHover = 'true';
      button.addEventListener('mouseenter', () => gsap.to(button, { y: -2, scale: 1.018, duration: 0.22, overwrite: 'auto' }));
      button.addEventListener('mouseleave', () => gsap.to(button, { y: 0, scale: 1, duration: 0.22, overwrite: 'auto' }));
    });

    if (window.ScrollTrigger) {
      setTimeout(() => ScrollTrigger.refresh(), 120);
    }
  }

  function enhanceBackToTop() {
    const button = document.querySelector('.back-to-top');
    if (!button || button.dataset.pinkodeBackTop) return;
    button.dataset.pinkodeBackTop = 'true';
    button.setAttribute('title', '回到顶部');
    if (!window.gsap) return;

    gsap.set(button, { autoAlpha: 0, y: 16, scale: 0.88, pointerEvents: 'none' });
    const setVisible = visible => {
      gsap.to(button, {
        autoAlpha: visible ? 1 : 0,
        y: visible ? 0 : 16,
        scale: visible ? 1 : 0.88,
        pointerEvents: visible ? 'auto' : 'none',
        duration: 0.28,
        overwrite: 'auto'
      });
    };
    const onScroll = () => setVisible(window.scrollY > Math.min(360, window.innerHeight * 0.45));
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    button.addEventListener('click', event => {
      event.preventDefault();
      const scrollState = { y: window.scrollY };
      gsap.to(scrollState, {
        y: 0,
        duration: 0.75,
        ease: 'power3.inOut',
        onUpdate: () => window.scrollTo(0, scrollState.y)
      });
    });
  }

  function enhanceMenus() {
    const toggle = document.querySelector('.site-nav-toggle .toggle');
    const siteNav = document.querySelector('.site-nav');
    if (!toggle || !siteNav || toggle.dataset.pinkodeMenu) return;
    toggle.dataset.pinkodeMenu = 'true';
    toggle.addEventListener('click', () => {
      if (!window.gsap || !document.body.classList.contains('site-nav-on')) return;
      gsap.fromTo('.site-nav .menu-item', {
        autoAlpha: 0,
        y: -10
      }, {
        autoAlpha: 1,
        y: 0,
        stagger: 0.045,
        duration: 0.35,
        overwrite: true
      });
    });
  }

  function refreshComments() {
    const container = document.querySelector('.comments-container');
    if (!container) return;
    const giscus = container.querySelector('script[src*="giscus.app/client.js"], iframe.giscus-frame');
    if (giscus) return;
    const script = document.createElement('script');
    script.src = 'https://giscus.app/client.js';
    script.setAttribute('data-repo', 'P1nk0d3/P1nk0d3.github.io');
    script.setAttribute('data-repo-id', 'R_kgDOQm6oMw');
    script.setAttribute('data-category', 'Announcements');
    script.setAttribute('data-category-id', 'DIC_kwDOQm6oM84CzxkR');
    script.setAttribute('data-mapping', 'pathname');
    script.setAttribute('data-strict', '0');
    script.setAttribute('data-reactions-enabled', '1');
    script.setAttribute('data-emit-metadata', '0');
    script.setAttribute('data-input-position', 'top');
    script.setAttribute('data-theme', 'preferred_color_scheme');
    script.setAttribute('data-lang', 'zh-CN');
    script.setAttribute('data-loading', 'lazy');
    script.crossOrigin = 'anonymous';
    script.async = true;
    container.appendChild(script);
  }

  function fixCompatibility() {
    if (/firefox/i.test(navigator.userAgent)) {
      document.querySelector('meta[name="theme-color"]')?.setAttribute('content', THEME.cream);
    }
    if (/safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent)) {
      document.querySelectorAll('input[autocapitalize]').forEach(input => input.removeAttribute('autocapitalize'));
    }
  }

  function initPageEnhancements() {
    ensureCuteBackground();
    ensureGSAP().then(() => {
      animateCuteBackground();
      animatePage();
      enhanceBackToTop();
      enhanceMenus();
    });
    refreshComments();
    fixCompatibility();
  }

  document.addEventListener('DOMContentLoaded', () => {
    ensureAPlayer();
    initPageEnhancements();
  });
  document.addEventListener('page:loaded', initPageEnhancements);
  document.addEventListener('pjax:send', clearPageMotion);
  document.addEventListener('click', () => {
    document.querySelectorAll('audio').forEach(audio => { audio.volume = Math.min(audio.volume || 0.65, 0.65); });
  }, { once: true });
})();
</script>

</body>
</html>
